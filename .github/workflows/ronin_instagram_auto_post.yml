name: RoninWords Instagram自動投稿 (v2)

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 7:00 JST（UTC+9なので前日22:00 UTC）
    - cron: '0 3 * * *'    # 毎日12:00 JST（UTC 3:00）
    - cron: '0 9 * * *'    # 毎日18:00 JST（UTC 9:00）
    - cron: '0 12 * * *'   # 毎日21:00 JST（UTC 12:00）
  workflow_dispatch:  # 手動実行も可能

# 同時実行でgit pushがバッティングするのを防ぐ設定
# ronin Instagram専用のグループ名にすることで、他ワークフローと干渉しない
concurrency:
  group: ronin-instagram-post
  cancel-in-progress: false  # キャンセルせず、順番待ちにする

permissions:
  contents: write  # 進捗ファイルをコミット・プッシュするために必要

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests python-dotenv

      - name: .envファイルを作成（GitHub Secretsから）
        run: |
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env

      - name: Instagram自動投稿を実行
        run: python3 ronin/ronin_instagram_auto_post.py

      - name: 進捗ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ronin/ronin_instagram_progress.json
          if ! git diff --cached --quiet; then
            git commit -m "自動投稿: Instagram進捗更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
