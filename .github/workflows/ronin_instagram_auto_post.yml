name: RoninWords Instagram自動投稿 (v2)

on:
  schedule:
    # 毎日1回 21:17 JST（12:17 UTC）
    - cron: '17 12 * * *'  # 21:17 JST
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # 進捗ファイルをコミット・プッシュするために必要

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests python-dotenv

      - name: .envファイルを作成（GitHub Secretsから）
        run: |
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env

      - name: Instagram自動投稿を実行
        run: python3 ronin/ronin_instagram_auto_post.py

      - name: 進捗ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ronin/ronin_instagram_progress.json
          git diff --cached --quiet || git commit -m "自動投稿: Instagram進捗更新"
          git pull --rebase origin main
          git push
