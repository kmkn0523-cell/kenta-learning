# skin_incoming_reply_engine.yml
# skin Threads 受信コメント返信エンジン
# 自分の直近投稿に来た外部コメントへ、JST日中に1日6回だけ様子を見に行って自動返信する
# （合計が日次上限10の下に収まる設計。skin_threads_reply_engine.yml と同じ時間割）

name: skin Threads 受信コメント返信エンジン

on:
  schedule:
    - cron: '20 23 * * *'  # JST 08:20
    - cron: '20 2 * * *'   # JST 11:20
    - cron: '20 5 * * *'   # JST 14:20
    - cron: '20 8 * * *'   # JST 17:20
    - cron: '20 11 * * *'  # JST 20:20
    - cron: '20 13 * * *'  # JST 22:20
  workflow_dispatch:  # 手動実行（テスト用）

concurrency:
  group: skin-incoming-reply-engine  # 二重起動・push競合を防ぐ専用グループ
  cancel-in-progress: false

jobs:
  incoming-reply-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 状態ファイルのpushに必要
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリをインストール
        run: pip install requests

      - name: 状態ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: skin/skin_incoming_reply_history.json
          key: skin-incoming-reply-history-${{ github.run_id }}
          restore-keys: |
            skin-incoming-reply-history-

      - name: 受信コメント返信エンジンを実行
        env:
          SKIN_INCOMING_REPLY_ENABLED: ${{ vars.SKIN_INCOMING_REPLY_ENABLED }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: cd skin && python skin_incoming_reply_engine.py

      - name: 状態ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: skin/skin_incoming_reply_history.json
          key: skin-incoming-reply-history-${{ github.run_id }}

      - name: 状態ファイルをGitにコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 履歴ファイルが無い場合（キルスイッチOFFで停止した等）はコミット不要なので静かに終了する
          if [ ! -f skin/skin_incoming_reply_history.json ]; then
            echo "履歴ファイルが無いためコミットをスキップします。"
            exit 0
          fi
          git add skin/skin_incoming_reply_history.json
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: skin 受信コメント返信エンジン状態更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
