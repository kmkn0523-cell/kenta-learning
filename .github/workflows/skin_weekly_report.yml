# skin_weekly_report.yml
# skin Threads の週次レポートを毎週月曜JST朝に自動生成し、Gmailで通知する。
# 直近7日の数字・伸びた投稿・A/B判定・次の打ち手をまとめる（skin_weekly_report.py）。

name: skin 週次レポート

on:
  schedule:
    - cron: '0 23 * * 0'  # JST 月曜 08:00（UTC 日曜23:00）
  workflow_dispatch:  # 手動実行（テスト用）

concurrency:
  group: skin-weekly-report  # 二重起動・push競合を防ぐ専用グループ
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # レポートmdのpushに必要
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 週次レポートを生成してメール送信
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: cd skin && python skin_weekly_report.py

      - name: レポートをGitにコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add skin/skin_weekly_report.md
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: skin週次レポート更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
