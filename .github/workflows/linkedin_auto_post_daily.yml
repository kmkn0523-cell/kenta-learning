name: LinkedIn Auto Post Weekly

on:
  schedule:
    # 毎週金曜 8:00 UTC (17:00 JST)
    - cron: '0 8 * * 5'
  # GitHubのUI上から手動で実行するオプション
  workflow_dispatch:

permissions:
  contents: write  # 進捗ファイルをコミット・プッシュするために必要

# 同じグループ名のジョブは同時に1つだけ動く（push競合を防ぐ）
concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  post_and_analyze:
    # Ubuntu最新版の環境で実行
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）
    steps:
      # リポジトリのコードをチェックアウト
      - uses: actions/checkout@v4

      # Python 3.9をセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 必要なPythonライブラリをインストール
      - name: Install dependencies
        run: pip install requests

      # GitHubのSecretsからLinkedIn設定を取得して、ローカルファイルとして保存
      - name: Prepare LinkedIn config from Secrets
        env:
          LINKEDIN_CONFIG: ${{ secrets.LINKEDIN_CONFIG }}
        run: |
          mkdir -p linkedin
          echo "$LINKEDIN_CONFIG" > linkedin/linkedin_config.json

      # LinkedIn自動投稿スクリプトを実行
      - name: Post to LinkedIn
        run: python3 linkedin/linkedin_auto_post.py

      # LinkedInエンゲージメント分析スクリプトを実行
      - name: Collect analytics
        run: python3 linkedin/linkedin_analytics.py

      # 投稿進捗ファイルをGitにコミット
      - name: Commit progress
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add linkedin/linkedin_posting_progress.json linkedin/linkedin_analytics.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: update LinkedIn progress $(date '+%Y/%m/%d %H:%M' -u)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
