name: Ronin Threads Analytics Daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# 同じグループ名のジョブは同時に1つだけ動く（push競合を防ぐ）
concurrency:
  group: ronin-analytics  # ronin分析専用グループ（投稿系と競合しない）
  cancel-in-progress: false

jobs:
  analytics:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Collect data from Threads API
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.RONIN_THREADS_ACCESS_TOKEN }}
          THREADS_BUSINESS_ACCOUNT_ID_RONIN: ${{ secrets.RONIN_THREADS_USER_ID }}
        run: python3 ronin/ronin_data_collector.py

      - name: Analyze patterns
        run: |
          python3 ronin/ronin_analyzer.py
          python3 ronin/ronin_optimizer.py

      - name: Commit and push changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add ronin/ronin_analytics.json ronin/ronin_optimization_index.json
          if ! git diff --staged --quiet; then
            git commit -m "自動更新: ronin analytics $(date '+%Y/%m/%d %H:%M' -u)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
