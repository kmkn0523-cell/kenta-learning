name: skin 無料note 週次リリース（月水金 自動投稿）

on:
  workflow_dispatch:  # cron-job.org が月水金 9:00 JST に外部からトリガーする

permissions:
  contents: write  # progress.jsonの更新コミットに必要

# note-release専用グループ：Threads等の他ワークフローとは独立して動かす（競合キャンセル防止）
concurrency:
  group: note-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 次の記事を note_ready.md に展開する
        run: python3 skin/release_note.py

      - name: Playwrightをインストール
        run: |
          pip install playwright --quiet
          playwright install chromium --with-deps

      - name: note.com に自動投稿する
        id: post
        continue-on-error: true  # 失敗してもメール通知ステップは動かしたい
        env:
          NOTE_SESSION_V5: ${{ secrets.NOTE_SESSION_V5 }}
        run: python3 skin/post_to_note.py

      - name: 投稿結果メールを送信する
        if: always()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTE_POST_STATUS: ${{ steps.post.outcome }}
        run: python3 skin/send_note_email.py

      - name: 失敗時のスクリーンショットをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-screenshots
          path: skin/note_screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: 進捗ファイルをコミット・プッシュする
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/note_ready.md skin/note_queue_progress.json
          if ! git diff --cached --quiet; then
            git commit -m "自動リリース: note記事を投稿しhistory更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
