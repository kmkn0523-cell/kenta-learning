name: skin 無料note 週次リリース

on:
  schedule:
    - cron: '0 0 * * 1'  # 月曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 3'  # 水曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 5'  # 金曜 9:00 JST（UTC 0:00）
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # ファイルをコミット・プッシュするために必要

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 次の記事を note_ready.md に展開する
        run: python3 skin/release_note.py

      - name: 変更をコミット・プッシュする
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/note_ready.md skin/note_queue_progress.json
          git diff --cached --quiet || git commit -m "自動リリース: 今週のnote記事を展開"
          git pull --rebase origin main
          git push

      - name: markdownライブラリをインストール
        run: pip install markdown --quiet

      - name: メールで記事と画像を通知する
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import smtplib, os, json, re
          import markdown                           # MarkdownをHTMLに変換する道具
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.mime.image import MIMEImage

          # note_ready.md を読み込む
          with open("skin/note_ready.md", "r", encoding="utf-8") as f:
              content = f.read()

          # 1行目のコメントから記事ファイル名を取得する
          match = re.search(r'<!--.*?\|\s*(article_\d+\.md)', content)
          article_filename = match.group(1) if match else ""

          # コメント行を除いた記事本文を取得する
          lines = content.split("\n")
          body_lines = [l for l in lines if not l.startswith("<!--")]
          article_body = "\n".join(body_lines).strip()

          # 記事タイトルを取得する
          title = next((l.lstrip("# ") for l in body_lines if l.startswith("# ")), "今週の記事")

          # マッピングファイルからLP画像を特定する
          lp_path = None
          try:
              with open("skin/note_lp_map.json", "r", encoding="utf-8") as f:
                  lp_map = json.load(f)
              lp_filename = lp_map.get(article_filename)
              if lp_filename:
                  lp_path = f"skin/{lp_filename}"
          except Exception:
              pass

          # MarkdownをHTMLに変換する
          html_body = markdown.markdown(article_body, extensions=["extra"])

          # noteに貼り付け用HTMLファイル（コピーボタン付き）
          article_html = f"""<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body {{ font-family: sans-serif; font-size: 16px; line-height: 1.8; max-width: 680px; margin: 0 auto; padding: 16px; color: #222; }}
  h1 {{ font-size: 22px; border-bottom: 2px solid #ccc; padding-bottom: 8px; }}
  h2 {{ font-size: 18px; margin-top: 24px; color: #333; }}
  strong {{ font-weight: bold; color: #111; }}
  hr {{ border: none; border-top: 1px solid #ddd; margin: 20px 0; }}
  blockquote {{ border-left: 4px solid #aaa; margin: 0; padding-left: 16px; color: #555; }}
  #copy-btn {{ display: block; width: 100%; padding: 16px; font-size: 18px; font-weight: bold;
               background: #0066cc; color: white; border: none; border-radius: 10px;
               margin-bottom: 24px; cursor: pointer; }}
  #copy-btn.done {{ background: #28a745; }}
  #article {{ padding: 8px 0; }}
</style></head><body>
<button id="copy-btn" onclick="copyArticle()">📋 記事をコピーする</button>
<div id="article">{html_body}</div>
<script>
function copyArticle() {{
  var el = document.getElementById('article');
  var html = el.innerHTML;
  var text = el.innerText;
  try {{
    var item = new ClipboardItem({{
      'text/html': new Blob([html], {{type: 'text/html'}}),
      'text/plain': new Blob([text], {{type: 'text/plain'}})
    }});
    navigator.clipboard.write([item]).then(function() {{
      var btn = document.getElementById('copy-btn');
      btn.textContent = '✅ コピーしました！noteに貼り付けてください';
      btn.className = 'done';
    }});
  }} catch(e) {{
    var range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    document.getElementById('copy-btn').textContent = '✅ コピーしました！noteに貼り付けてください';
    document.getElementById('copy-btn').className = 'done';
  }}
}}
</script>
</body></html>"""

          # メールの本文HTML
          image_note = ""
          if lp_path:
              image_note = "<p>📎 <strong>ヘッダー画像も添付しています。</strong>noteにアップロードしてください。</p>"

          mail_html = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"><style>
            body {{ font-family: sans-serif; font-size: 16px; line-height: 1.8; max-width: 680px; margin: 0 auto; padding: 16px; }}
            .step-box {{ background: #e8f4ff; border-radius: 10px; padding: 16px; margin-bottom: 16px; }}
            .step-box p {{ margin: 6px 0; font-size: 15px; }}
          </style></head><body>
          <div class="step-box">
            <p><strong>📋 太字をそのままnoteに貼る手順（添付ファイルを使う）</strong></p>
            <p>① 添付の <strong>article.html</strong> をタップ</p>
            <p>② Safariで開く</p>
            <p>③ 青いボタン「📋 記事をコピーする」をタップ</p>
            <p>④ noteに貼り付け → 太字・見出しがそのまま入る</p>
          </div>
          {image_note}
          </body></html>"""

          # メールを組み立てる
          msg = MIMEMultipart("mixed")
          msg["From"]    = "kmkn0523@gmail.com"
          msg["To"]      = "kmkn0523@gmail.com"
          msg["Subject"] = f"【skin note】{title}"

          # メール本文
          msg_body = MIMEMultipart("alternative")
          msg_body.attach(MIMEText("添付のarticle.htmlをSafariで開いて、青いボタンをタップするとコピーできます。", "plain", "utf-8"))
          msg_body.attach(MIMEText(mail_html, "html", "utf-8"))
          msg.attach(msg_body)

          # HTMLファイルを添付する（コピーボタン付き記事）
          from email.mime.base import MIMEBase
          from email import encoders
          html_attachment = MIMEBase("text", "html")
          html_attachment.set_payload(article_html.encode("utf-8"))
          encoders.encode_base64(html_attachment)
          html_attachment.add_header("Content-Disposition", 'attachment; filename="article.html"')
          msg.attach(html_attachment)

          # LP画像を添付する（存在する場合のみ）
          if lp_path and os.path.exists(lp_path):
              with open(lp_path, "rb") as f:
                  img = MIMEImage(f.read(), name=os.path.basename(lp_path))
              msg.attach(img)
              print(f"📎 画像を添付: {lp_path}")

          # Gmailに接続して送信する
          password = os.environ["GMAIL_APP_PASSWORD"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login("kmkn0523@gmail.com", password)
              server.send_message(msg)

          print("✅ メール送信完了")
          EOF
