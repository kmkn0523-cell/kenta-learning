name: skin 無料note 週次リリース

on:
  schedule:
    - cron: '0 0 * * 1'  # 月曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 3'  # 水曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 5'  # 金曜 9:00 JST（UTC 0:00）
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # ファイルをコミット・プッシュするために必要

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 次の記事を note_ready.md に展開する
        run: python3 skin/release_note.py

      - name: 変更をコミット・プッシュする
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/note_ready.md skin/note_queue_progress.json
          git diff --cached --quiet || git commit -m "自動リリース: 今週のnote記事を展開"
          git pull --rebase origin main
          git push

      - name: markdownライブラリをインストール
        run: pip install markdown --quiet

      - name: メールで記事と画像を通知する
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - << 'EOF'
          import smtplib, os, json, re
          import markdown                           # MarkdownをHTMLに変換する道具
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.mime.image import MIMEImage

          # note_ready.md を読み込む
          with open("skin/note_ready.md", "r", encoding="utf-8") as f:
              content = f.read()

          # 1行目のコメントから記事ファイル名を取得する
          match = re.search(r'<!--.*?\|\s*(article_\d+\.md)', content)
          article_filename = match.group(1) if match else ""

          # コメント行を除いた記事本文を取得する
          lines = content.split("\n")
          body_lines = [l for l in lines if not l.startswith("<!--")]
          article_body = "\n".join(body_lines).strip()

          # 記事タイトルを取得する
          title = next((l.lstrip("# ") for l in body_lines if l.startswith("# ")), "今週の記事")

          # マッピングファイルからLP画像を特定する
          lp_path = None
          try:
              with open("skin/note_lp_map.json", "r", encoding="utf-8") as f:
                  lp_map = json.load(f)
              lp_filename = lp_map.get(article_filename)
              if lp_filename:
                  lp_path = f"skin/{lp_filename}"
          except Exception:
              pass

          # GitHub の記事URL（Safariで開くと太字・見出しが表示される）
          github_url = "https://github.com/kmkn0523-cell/kenta-learning/blob/main/skin/note_ready.md"

          # MarkdownをHTMLに変換する
          html_body = markdown.markdown(article_body, extensions=["extra"])

          # 画像の案内
          image_note = ""
          if lp_path:
              image_note = "<p>📎 <strong>ヘッダー画像を添付しました。</strong>noteにアップロードしてください。</p>"

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <style>
            body {{ font-family: sans-serif; font-size: 16px; line-height: 1.8;
                   max-width: 680px; margin: 0 auto; padding: 16px; color: #222; }}
            h1 {{ font-size: 22px; border-bottom: 2px solid #ccc; padding-bottom: 8px; }}
            h2 {{ font-size: 18px; margin-top: 24px; }}
            strong {{ color: #111; }}
            hr {{ border: none; border-top: 1px solid #ddd; margin: 20px 0; }}
            blockquote {{ border-left: 4px solid #aaa; margin: 0; padding-left: 16px; color: #555; }}
            .step-box {{ background: #e8f4ff; border-radius: 10px; padding: 16px; margin-bottom: 20px; }}
            .step-box a {{ color: #0066cc; font-weight: bold; font-size: 17px; }}
          </style></head><body>
          <div class="step-box">
            <p><strong>📋 太字をそのままnoteに貼る手順</strong></p>
            <p>① <a href="{github_url}">▶ ここをタップ → Safariで開く</a></p>
            <p>② 画面を長押し →「すべて選択」→「コピー」</p>
            <p>③ noteに貼り付け</p>
          </div>
          {image_note}
          <hr>
          <p style="color:#888;font-size:13px;">↓ テキスト版（書式なし）</p>
          {html_body}
          </body></html>"""

          # メールを組み立てる（HTML形式）
          msg = MIMEMultipart("mixed")
          msg["From"]    = "kmkn0523@gmail.com"
          msg["To"]      = "kmkn0523@gmail.com"
          msg["Subject"] = f"【skin note】{title}"

          # HTML本文
          msg_body = MIMEMultipart("alternative")
          msg_body.attach(MIMEText(article_body, "plain", "utf-8"))
          msg_body.attach(MIMEText(html, "html", "utf-8"))
          msg.attach(msg_body)

          # LP画像を添付する（存在する場合のみ）
          if lp_path and os.path.exists(lp_path):
              with open(lp_path, "rb") as f:
                  img = MIMEImage(f.read(), name=os.path.basename(lp_path))
              msg.attach(img)
              print(f"📎 画像を添付: {lp_path}")

          # Gmailに接続して送信する
          password = os.environ["GMAIL_APP_PASSWORD"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login("kmkn0523@gmail.com", password)
              server.send_message(msg)

          print("✅ メール送信完了")
          EOF
