name: skin 無料note 週次リリース（月水金 自動投稿）

on:
  schedule:
    - cron: '0 0 * * 1,3,5'  # UTC 0:00 = JST 9:00 月水金朝
    - cron: '0 11 * * 0'     # UTC 11:00 = JST 20:00 日曜夜（自己投資ゴールデンタイム）
  workflow_dispatch:  # 手動実行用（テスト・即時投稿）
    inputs:
      draft_mode:
        description: "テスト用：公開せず下書き保存のみ（履歴/next_indexは更新しない）"
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # progress.jsonの更新コミットに必要

# note-release専用グループ：Threads等の他ワークフローとは独立して動かす（競合キャンセル防止）
concurrency:
  group: note-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 次の記事を note_ready.md に展開する
        # 下書きモードでは note_ready.md は既存のものを再利用する（next_indexを進めない）
        if: ${{ inputs.draft_mode != true }}
        run: python3 skin/release_note.py

      - name: Playwrightをインストール
        run: |
          pip install playwright --quiet
          playwright install chromium --with-deps

      - name: note.com に自動投稿する
        id: post
        continue-on-error: true  # 失敗してもメール通知ステップは動かしたい
        env:
          NOTE_SESSION_V5: ${{ secrets.NOTE_SESSION_V5 }}
          NOTE_DRAFT_MODE: ${{ inputs.draft_mode }}
        run: python3 skin/post_to_note.py

      - name: 投稿結果メールを送信する
        if: always()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTE_POST_STATUS: ${{ steps.post.outcome }}
        run: python3 skin/send_note_email.py

      - name: Threadsにnote公開告知を投稿する
        # noteの投稿が成功し、かつ下書きモードでない場合のみ実行する
        if: ${{ steps.post.outcome == 'success' && inputs.draft_mode != true }}
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          NOTE_POST_STATUS: ${{ steps.post.outcome }}
        run: |
          pip install requests --quiet
          python3 skin/notify_threads_of_note.py

      - name: 失敗時のスクリーンショットをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-screenshots
          path: skin/note_screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: 進捗ファイルをコミット・プッシュする
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/note_ready.md skin/note_queue_progress.json
          if ! git diff --cached --quiet; then
            git commit -m "自動リリース: note記事を投稿しhistory更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
