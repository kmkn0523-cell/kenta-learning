name: skin 無料note 週次リリース（月水金）

on:
  schedule:
    - cron: '0 0 * * 1'  # 月曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 3'  # 水曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 5'  # 金曜 9:00 JST（UTC 0:00）
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # ファイルをコミット・プッシュするために必要

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 次の記事を note_ready.md に展開する
        run: python3 skin/release_note.py

      - name: ライブラリをインストール
        run: pip install markdown --quiet

      - name: GitHub Pages 用HTMLページを生成する
        run: python3 skin/generate_note_page.py

      - name: 変更をコミット・プッシュする
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/note_ready.md skin/note_queue_progress.json note_article.html
          git diff --cached --quiet || git commit -m "自動リリース: 今週のnote記事を展開"
          git pull --rebase origin main
          git push

      - name: GitHub Pages のデプロイを待つ
        run: sleep 60

      - name: メールで記事と画像を通知する
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 skin/send_note_email.py
