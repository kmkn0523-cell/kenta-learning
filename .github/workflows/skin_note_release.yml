name: skin 無料note 週次リリース（月水金）

on:
  workflow_dispatch:  # cron-job.org が月水金 9:00 JST に外部からトリガーする（GitHub内蔵cronより正確）

permissions:
  contents: write  # ファイルをコミット・プッシュするために必要

# 同じグループ名のジョブは同時に1つだけ動く（push競合を防ぐ）
concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 次の記事を note_ready.md に展開する
        run: python3 skin/release_note.py

      - name: ライブラリをインストール
        run: pip install markdown --quiet

      - name: GitHub Pages 用HTMLページを生成する
        run: python3 skin/generate_note_page.py

      - name: 変更をコミット・プッシュする
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/note_ready.md skin/note_queue_progress.json note_article.html
          if ! git diff --cached --quiet; then
            git commit -m "自動リリース: 今週のnote記事を展開"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi

      - name: GitHub Pages のデプロイを待つ
        run: sleep 60

      - name: メールで記事と画像を通知する
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 skin/send_note_email.py
