# ronin_threads_post.yml
# @RoninWords用 GitHub Actionsワークフロー
# 1日4回、決まった時間に自動でThreadsに投稿する

name: Ronin Threads 自動投稿

on:
  schedule:
    # 07:30 JST = 22:30 UTC
    - cron: '30 22 * * *'
    # 08:30 JST = 23:30 UTC
    - cron: '30 23 * * *'
    # 09:30 JST = 00:30 UTC
    - cron: '30 0 * * *'
    # 10:30 JST = 01:30 UTC
    - cron: '30 1 * * *'
    # 11:30 JST = 02:30 UTC
    - cron: '30 2 * * *'
    # 12:30 JST = 03:30 UTC
    - cron: '30 3 * * *'
    # 13:30 JST = 04:30 UTC
    - cron: '30 4 * * *'
    # 14:30 JST = 05:30 UTC
    - cron: '30 5 * * *'
    # 15:30 JST = 06:30 UTC
    - cron: '30 6 * * *'
    # 16:30 JST = 07:30 UTC
    - cron: '30 7 * * *'
    # 17:30 JST = 08:30 UTC
    - cron: '30 8 * * *'
    # 18:30 JST = 09:30 UTC
    - cron: '30 9 * * *'
    # 19:30 JST = 10:30 UTC
    - cron: '30 10 * * *'
    # 20:30 JST = 11:30 UTC
    - cron: '30 11 * * *'
    # 21:30 JST = 12:30 UTC
    - cron: '30 12 * * *'
    # 22:30 JST = 13:30 UTC
    - cron: '30 13 * * *'
  workflow_dispatch:  # 手動でも実行できるようにする（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest  # GitHubのサーバーで動かす

    steps:
      # Step 1: リポジトリのファイルをダウンロードする
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Pythonをセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests

      # Step 4: 進捗ファイルをキャッシュから復元する
      # これがないと毎回同じ投稿になってしまう
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: ronin/ronin_threads_progress.json
          key: ronin-threads-progress-${{ github.run_id }}
          restore-keys: |
            ronin-threads-progress-

      # Step 5: Threadsに自動投稿する（@RoninWords用のSecretsを渡す）
      - name: Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.RONIN_THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.RONIN_THREADS_USER_ID }}
        run: cd ronin && python ronin_threads_action.py

      # Step 6: 更新した進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: ronin/ronin_threads_progress.json
          key: ronin-threads-progress-${{ github.run_id }}
