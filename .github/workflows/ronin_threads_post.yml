# ronin_threads_post.yml
# @RoninWords用 GitHub Actionsワークフロー
# 毎日4回、決まった時間に自動でThreadsに投稿する

name: Ronin Threads 自動投稿

on:
  schedule:
    # 米東部ET基準に最適化（欧米ターゲットの黄金時間に投稿する）
    # GitHub Actionsのcronは数分〜数十分遅れることがあるので、多少前後してOKな時間帯に置いている
    # ET 08:00 朝の通勤タイム = 12:00 UTC
    - cron: '0 12 * * *'
    # ET 12:30 昼休み = 16:30 UTC
    - cron: '30 16 * * *'
    # ET 18:00 帰宅後 = 22:00 UTC
    - cron: '0 22 * * *'
    # ET 20:00 夜のピーク（いちばん見られる時間）= 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動でも実行できるようにする（テスト用）

# 同じグループ名のジョブは同時に1つだけ動く（push競合を防ぐ）
concurrency:
  group: ronin-threads-post  # ronin Threads専用グループ（skin Threadsと競合しない）
  cancel-in-progress: false  # 実行中のジョブを止めず、後から来たジョブを待たせる

jobs:
  post:
    runs-on: ubuntu-latest  # GitHubのサーバーで動かす
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    # リポジトリへの書き込み権限を明示的に許可する（進捗ファイルをコミットするため）
    permissions:
      contents: write

    steps:
      # Step 1: リポジトリのファイルをダウンロードする
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Pythonをセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests

      # Step 4: 進捗ファイルをキャッシュから復元する
      # これがないと毎回同じ投稿になってしまう
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: ronin/ronin_threads_progress.json
          key: ronin-threads-progress-${{ github.run_id }}
          restore-keys: |
            ronin-threads-progress-

      # Step 5: Threadsに自動投稿する（@RoninWords用のSecretsを渡す）
      - name: Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.RONIN_THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.RONIN_THREADS_USER_ID }}
        run: cd ronin && python ronin_threads_action.py

      # Step 6: 更新した進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: ronin/ronin_threads_progress.json
          key: ronin-threads-progress-${{ github.run_id }}

      # Step 6.5: 進捗ファイルをGitにコミット＆プッシュする
      # キャッシュだけだと7日間アクセスがないと消えてしまい、同じ投稿が繰り返されるバグがある
      # コミットしておけば、キャッシュが消えても正しい位置から再開できる
      - name: 進捗ファイルをGitにコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ronin/ronin_threads_progress.json
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: Ronin進捗更新"
            pushed=false
            for i in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                pushed=true
                break
              fi
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
            if [ "$pushed" = "false" ]; then
              echo "⚠ push全試行失敗（Threads投稿は成功済み・キャッシュに保存済み）"
            fi
          fi

