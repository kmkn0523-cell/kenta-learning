name: RoninWords Instagram投稿

on:
  schedule:
    # 7:30〜22:30 JST 毎時30分（16回/日）
    - cron: '30 22 * * *'  # 7:30 JST
    - cron: '30 23 * * *'  # 8:30 JST
    - cron: '30 0 * * *'   # 9:30 JST
    - cron: '30 1 * * *'   # 10:30 JST
    - cron: '30 2 * * *'   # 11:30 JST
    - cron: '30 3 * * *'   # 12:30 JST
    - cron: '30 4 * * *'   # 13:30 JST
    - cron: '30 5 * * *'   # 14:30 JST
    - cron: '30 6 * * *'   # 15:30 JST
    - cron: '30 7 * * *'   # 16:30 JST
    - cron: '30 8 * * *'   # 17:30 JST
    - cron: '30 9 * * *'   # 18:30 JST
    - cron: '30 10 * * *'  # 19:30 JST
    - cron: '30 11 * * *'  # 20:30 JST
    - cron: '30 12 * * *'  # 21:30 JST
    - cron: '30 13 * * *'  # 22:30 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests python-dotenv

      - name: .envファイルを作成（GitHub Secretsから）
        run: |
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_USER_ID=${{ secrets.INSTAGRAM_USER_ID }}" >> .env

      - name: Instagram自動投稿を実行
        run: python3 ronin/ronin_instagram_auto_post.py

      - name: 進捗ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ronin/ronin_instagram_progress.json
          git diff --cached --quiet || git commit -m "自動投稿: Instagram進捗更新"
          git pull --rebase origin main
          git push
