# ronin_substack_post.yml
# RoninWords Substack 自動投稿ワークフロー
# 毎日1回、書道カード画像 + 諺テキストを無料記事として公開する

name: RoninWords Substack 自動投稿

on:
  schedule:
    # 09:00 JST = 00:00 UTC に毎日実行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 進捗ファイルをコミットするために必要

    steps:
      # Step 1: リポジトリをダウンロードする（画像・スクリプト・進捗ファイルが含まれる）
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Python をセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests python-dotenv

      # Step 4: 進捗ファイルをキャッシュから復元する
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: ronin/substack/substack_progress.json
          key: substack-progress-${{ github.run_id }}
          restore-keys: |
            substack-progress-

      # Step 5: Substack に自動投稿する
      - name: Substack に投稿
        env:
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
        run: cd ronin && python substack_auto_post.py

      # Step 6: 進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: ronin/substack/substack_progress.json
          key: substack-progress-${{ github.run_id }}

      # Step 7: 進捗ファイルを Git にコミットして保存する（キャッシュ消失対策）
      - name: 進捗ファイルをコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ronin/substack/substack_progress.json
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: Substack進捗更新"
            git pull --rebase origin main
            git push
          fi
