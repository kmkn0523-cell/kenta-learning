# ronin_substack_post.yml
# RoninWords Substack 自動投稿ワークフロー
# 毎日1回、書道カード画像 + 諺テキストを無料記事として公開する

name: RoninWords Substack 自動投稿

on:
  schedule:
    # 1日4回トリガーする（JST 00:00 / 06:00 / 12:00 / 18:00 = UTC 15:00 / 21:00 / 03:00 / 09:00）
    # スクリプト側の「本日すでに投稿済みならスキップ」ガードにより、実際の投稿は1日1本だけ。
    # 自宅PCのrunnerが00:00 JSTにオフでも、その日のどこかでオンになれば必ず1本投稿される（抜け防止）。
    - cron: '0 15,21,3,9 * * *'
  workflow_dispatch:  # 手動実行も可能（テスト用）

# Substackジョブは他のワークフロー（Threads等）と別グループにして待ち行列を分離する
concurrency:
  group: substack-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: [self-hosted, Linux, X64]  # 自宅PCのrunnerで動かす（Cloudflare回避のため）
    timeout-minutes: 5  # 5分以上かかる場合は強制終了（通常1〜2分で完了するため）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    permissions:
      contents: write  # 進捗ファイルをコミットするために必要

    steps:
      # Step 1: リポジトリをダウンロードする（画像・スクリプト・進捗ファイルが含まれる）
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Python をセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      # curl_cffi: ChromeのTLSフィンガープリントを完全再現してCloudflareを回避する
      - name: ライブラリをインストール
        run: pip install curl_cffi python-dotenv

      # Step 4: Substack に自動投稿する（書道カード記事）
      # progress.json は actions/checkout で取得したgitの最新状態をそのまま使う
      # （キャッシュは廃止：古いキャッシュがgitの正しい状態を上書きして重複投稿が起きるため）
      - name: Substack にカード記事を投稿
        env:
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
        run: cd ronin && python substack_auto_post.py

      # Step 5: Substack に自動投稿する（deep-dive 長文記事・カード記事と同じ Day 番号）
      - name: Substack に deep-dive 記事を投稿
        env:
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
        run: cd ronin && python substack_deep_dive_auto_post.py

      # Step 6: 進捗ファイルを Git にコミットして保存する
      - name: 進捗ファイルをコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ronin/substack/substack_progress.json ronin/substack/deep_dive_progress.json
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: Substack進捗更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
