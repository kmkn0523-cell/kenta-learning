# ronin_substack_post.yml
# RoninWords Substack 自動投稿ワークフロー
# 毎日1回、書道カード画像 + 諺テキストを無料記事として公開する

name: RoninWords Substack 自動投稿

on:
  schedule:
    # 19:00 JST = 10:00 UTC に毎日実行
    - cron: '0 10 * * *'
  workflow_dispatch:  # 手動実行も可能（テスト用）

# 同じグループ名のジョブは同時に1つだけ動く（push競合を防ぐ）
concurrency:
  group: git-push-main
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    permissions:
      contents: write  # 進捗ファイルをコミットするために必要

    steps:
      # Step 1: リポジトリをダウンロードする（画像・スクリプト・進捗ファイルが含まれる）
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Python をセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      # curl_cffi: ChromeのTLSフィンガープリントを完全再現してCloudflareを回避する
      - name: ライブラリをインストール
        run: pip install curl_cffi python-dotenv

      # Step 4: 進捗ファイルをキャッシュから復元する
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: ronin/substack/substack_progress.json
          key: substack-progress-${{ github.run_id }}
          restore-keys: |
            substack-progress-

      # Step 5: Substack に自動投稿する
      - name: Substack に投稿
        env:
          SUBSTACK_SID: ${{ secrets.SUBSTACK_SID }}
        run: cd ronin && python substack_auto_post.py

      # Step 6: 進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: ronin/substack/substack_progress.json
          key: substack-progress-${{ github.run_id }}

      # Step 7: 進捗ファイルを Git にコミットして保存する（キャッシュ消失対策）
      - name: 進捗ファイルをコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ronin/substack/substack_progress.json
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: Substack進捗更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
