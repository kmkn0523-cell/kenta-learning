# threads_post.yml
# GitHub Actionsのワークフローファイル
# 毎日16回、決まった時間に自動でThreadsに投稿する

name: skin Threads 自動投稿

on:
  schedule:
    # 07:30 JST = 22:30 UTC
    - cron: '30 22 * * *'
    # 12:30 JST = 03:30 UTC
    - cron: '30 3 * * *'
    # 18:30 JST = 09:30 UTC
    - cron: '30 9 * * *'
    # 21:30 JST = 12:30 UTC
    - cron: '30 12 * * *'
  workflow_dispatch:  # 手動でも実行できるようにする（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest  # GitHubのサーバーで動かす
    permissions:
      contents: write  # git pushに必要な書き込み権限

    steps:
      # Step 1: リポジトリのファイルをダウンロードする
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Pythonをセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests

      # Step 4: 進捗ファイルをキャッシュから復元する
      # これがないと毎回同じ投稿になってしまう
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: skin/skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
          restore-keys: |
            skin-threads-progress-

      # Step 5: Threadsに自動投稿する
      - name: Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: cd skin && python skin_threads_action.py

      # Step 6: 更新した進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: skin/skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}

      # Step 7: 進捗ファイルをGitにコミット＆プッシュする
      # キャッシュだけだと7日間アクセスがないと消えてしまい、同じ投稿が繰り返されるバグがある
      - name: 進捗ファイルをGitにコミット＆プッシュ
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add skin/skin_threads_progress.json
          if ! git diff --staged --quiet; then
            git commit -m "自動同期: skin Threads進捗更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
