# threads_post.yml
# GitHub Actionsのワークフローファイル
# 毎日決まった時間に自動でThreadsに投稿する

name: Threads 自動投稿

on:
  schedule:
    # 朝1投稿: 毎日 22:30 UTC = 日本時間 07:30
    - cron: '30 22 * * *'
    # 朝2投稿: 毎日 00:30 UTC = 日本時間 09:30
    - cron: '30 0 * * *'
    # 昼1投稿: 毎日 03:30 UTC = 日本時間 12:30
    - cron: '30 3 * * *'
    # 昼2投稿: 毎日 05:30 UTC = 日本時間 14:30
    - cron: '30 5 * * *'
    # 夕1投稿: 毎日 07:30 UTC = 日本時間 16:30
    - cron: '30 7 * * *'
    # 夕2投稿: 毎日 09:30 UTC = 日本時間 18:30
    - cron: '30 9 * * *'
    # 夜1投稿: 毎日 11:30 UTC = 日本時間 20:30
    - cron: '30 11 * * *'
    # 夜2投稿: 毎日 13:30 UTC = 日本時間 22:30
    - cron: '30 13 * * *'
  workflow_dispatch:  # 手動でも実行できるようにする（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest  # GitHubのサーバーで動かす

    steps:
      # Step 1: リポジトリのファイルをダウンロードする
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Pythonをセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests

      # Step 4: 進捗ファイルをキャッシュから復元する
      # これがないと毎回同じ投稿になってしまう
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: skin/skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
          restore-keys: |
            skin-threads-progress-

      # Step 5: Threadsに自動投稿する
      - name: Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: cd skin && python skin_threads_action.py

      # Step 6: 更新した進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: skin/skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
