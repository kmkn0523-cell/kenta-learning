# threads_post.yml
# GitHub Actionsのワークフローファイル
# 毎日決まった時間に自動でThreadsに投稿する

name: Threads 自動投稿

on:
  schedule:
    # GitHub Actionsは「毎時0分」の発火が混雑で遅延・スキップされやすいため、7分にずらす
    # 朝投稿: 毎日 22:07 UTC = 日本時間 07:07
    - cron: '7 22 * * *'
    # 昼投稿: 毎日 03:07 UTC = 日本時間 12:07
    - cron: '7 3 * * *'
    # 夕投稿: 毎日 09:07 UTC = 日本時間 18:07
    - cron: '7 9 * * *'
    # 夜投稿: 毎日 13:07 UTC = 日本時間 22:07
    - cron: '7 13 * * *'
  workflow_dispatch:  # 手動でも実行できるようにする（テスト用）

jobs:
  post:
    runs-on: ubuntu-latest  # GitHubのサーバーで動かす

    steps:
      # Step 1: リポジトリのファイルをダウンロードする
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Pythonをセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests

      # Step 4: 進捗ファイルをキャッシュから復元する
      # これがないと毎回同じ投稿になってしまう
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
          restore-keys: |
            skin-threads-progress-

      # Step 5: Threadsに自動投稿する
      - name: Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python skin_threads_action.py

      # Step 6: 更新した進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
