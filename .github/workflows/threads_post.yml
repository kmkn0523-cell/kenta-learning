# threads_post.yml
# GitHub Actionsのワークフローファイル
# 毎日決まった時間に自動でThreadsに投稿する

name: Threads 自動投稿

on:
  # GitHub自前のスケジュール実行（UTC時間で指定・JST = UTC+9）
  # JST 7:07 = UTC 22:07(前日) / 12:07 = UTC 3:07 / 18:07 = UTC 9:07 / 22:07 = UTC 13:07
  schedule:
    - cron: '7 22 * * *'   # JST 7:07
    - cron: '7 3 * * *'    # JST 12:07
    - cron: '7 9 * * *'    # JST 18:07
    - cron: '7 13 * * *'   # JST 22:07
  workflow_dispatch:  # 手動実行・テスト用

jobs:
  post:
    runs-on: ubuntu-latest  # GitHubのサーバーで動かす

    steps:
      # Step 1: リポジトリのファイルをダウンロードする
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # Step 2: Pythonをセットアップする
      - name: Python 3.12 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: 必要なライブラリをインストールする
      - name: ライブラリをインストール
        run: pip install requests

      # Step 4: 進捗ファイルをキャッシュから復元する
      # これがないと毎回同じ投稿になってしまう
      - name: 進捗ファイルをキャッシュから復元
        uses: actions/cache@v4
        with:
          path: skin/skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
          restore-keys: |
            skin-threads-progress-

      # Step 5: Threadsに自動投稿する
      - name: Threadsに投稿
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: cd skin && python skin_threads_action.py

      # Step 6: 更新した進捗ファイルをキャッシュに保存する
      - name: 進捗ファイルをキャッシュに保存
        uses: actions/cache@v4
        with:
          path: skin/skin_threads_progress.json
          key: skin-threads-progress-${{ github.run_id }}
