name: skin Instagram 監視・自動修復

# 投稿時刻の「5分後」と「40分後」に発火して「最近投稿されているか？」を確認する
# 投稿が遅れていたら自動で投稿スクリプトを実行する（ウォッチドッグ）
# ※ 5分後: auto_postが正常に動いたか素早く確認
# ※ 40分後: 失敗していた場合の自動修復（90分スキップ窓の内側で余裕を持って再投稿）

on:
  schedule:
    # 8:00 JST (23:00 UTC) の投稿を監視（40分後のみ）
    # ※ 5分後チェックはメイン投稿と競合して重複投稿の原因になるため廃止
    - cron: '40 23 * * *'  #  8:40 JST（40分後チェック）
    # 12:00 JST (3:00 UTC) の投稿を監視（40分後のみ）
    - cron: '40 3 * * *'   # 12:40 JST（40分後チェック）
    # 18:00 JST (9:00 UTC) の投稿を監視（40分後のみ）
    - cron: '40 9 * * *'   # 18:40 JST（40分後チェック）
    # 21:00 JST (12:00 UTC) の投稿を監視（40分後のみ）
    - cron: '40 12 * * *'  # 21:40 JST（40分後チェック）
  workflow_dispatch:  # 手動実行も可能（テスト用）

# メイン投稿ワークフローと同じ concurrency グループにすることで、
# watchdog とメインが同時に動いて二重投稿するのを防ぐ
concurrency:
  group: skin-instagram-post
  cancel-in-progress: false  # キャンセルせず、順番待ちにする

permissions:
  contents: write  # 進捗ファイルをコミット・プッシュするために必要

jobs:
  watchdog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests python-dotenv

      - name: .envファイルを作成（GitHub Secretsから）
        run: |
          echo "SKIN_INSTAGRAM_ACCESS_TOKEN=${{ secrets.SKIN_INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "SKIN_INSTAGRAM_USER_ID=${{ secrets.SKIN_INSTAGRAM_USER_ID }}" >> .env

      # 投稿スクリプトを実行する
      # スクリプト内のヘルスチェックが「90分以内に投稿済みなら自動スキップ」を判定する
      # 90分以上経過していれば自動で投稿する（自動修復）
      - name: 監視・自動修復を実行
        run: python3 skin/skin_instagram_auto_post.py

      # 進捗ファイルをGitに保存する（投稿した場合のみコミットされる）
      - name: 進捗ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/skin_instagram_progress.json
          if ! git diff --cached --quiet; then
            git commit -m "自動修復: skin Instagram進捗更新"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
