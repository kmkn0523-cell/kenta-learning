name: skin Instagram自動投稿

on:
  schedule:
    - cron: '0 22 * * *'   # 7:00 JST
    - cron: '0 3 * * *'    # 12:00 JST
    - cron: '0 9 * * *'    # 18:00 JST
    - cron: '0 12 * * *'   # 21:00 JST
  workflow_dispatch:  # 手動実行も可能

# 同時に複数のジョブが動いてgit pushがぶつかるのを防ぐ設定
# 同じグループ名のジョブは、前のジョブが終わるまで待ってから実行される
concurrency:
  group: skin-instagram-push
  cancel-in-progress: false  # キャンセルせず、順番待ちにする

permissions:
  contents: write  # 進捗ファイルをコミット・プッシュするために必要

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install requests python-dotenv

      - name: .envファイルを作成（GitHub Secretsから）
        run: |
          echo "SKIN_INSTAGRAM_ACCESS_TOKEN=${{ secrets.SKIN_INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "SKIN_INSTAGRAM_USER_ID=${{ secrets.SKIN_INSTAGRAM_USER_ID }}" >> .env

      - name: Instagram自動投稿を実行
        run: python3 skin/skin_instagram_auto_post.py

      - name: 進捗ファイルをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skin/skin_instagram_progress.json
          git diff --cached --quiet || git commit -m "自動投稿: skin Instagram進捗更新"
          git pull --rebase origin main
          git push
