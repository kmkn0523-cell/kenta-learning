name: skin Analytics Daily

on:
  schedule:
    - cron: '0 6 * * *'  # 毎日 06:00 UTC (15:00 JST)
  workflow_dispatch:

# 同じグループ名のジョブは同時に1つだけ動く（push競合を防ぐ）
concurrency:
  group: skin-analytics  # skin分析専用グループ（投稿系と競合しない）
  cancel-in-progress: false

jobs:
  analytics_pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使う（Node.js 20廃止対応）
    permissions:
      contents: write

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install requests python-dotenv

      # Step 4: Collect data from Threads API
      - name: Collect data from Threads API
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python3 skin/skin_data_collector.py

      # Step 4.5: Collect account-level views & followers (アカウント全体の閲覧数・フォロワー数)
      - name: Collect account-level metrics
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python3 skin/skin_account_metrics_collector.py

      # Step 5: Analyze patterns
      - name: Analyze patterns
        run: python3 skin/skin_analyzer.py && python3 skin/skin_optimizer.py

      # Step 6: Commit and push changes
      - name: Commit and push changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add skin/skin_analytics.json skin/skin_optimization_index.json skin/skin_account_metrics.json
          if ! git diff --staged --quiet; then
            git commit -m "自動更新: skin analytics $(date '+%Y/%m/%d %H:%M' -u)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "push失敗 リトライ $i/3..."
              sleep 5
            done
          fi
